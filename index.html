<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HBD Najmi!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #000; 
            overflow: hidden; 
            font-family: 'Press Start 2P', cursive;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        #star-canvas { z-index: 1; }
        #pixel-canvas { z-index: 5; pointer-events: auto; }

        /* Step 1: Overlay */
        #overlay { z-index: 20; text-align: center; padding: 20px; }
        h1 { font-size: 0.9rem; margin-bottom: 30px; line-height: 1.6; }
        button {
            padding: 15px 25px;
            font-family: 'Press Start 2P', cursive;
            background: #ffff00;
            border: 4px solid #ccaa00;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Step 2: Kue & Pesan */
        #ui-layer {
            position: absolute;
            bottom: 5%;
            z-index: 15;
            width: 100%;
            text-align: center;
            display: none;
        }

        .cake-container {
            font-size: 2.5rem;
            margin-bottom: 20px;
            position: relative;
            cursor: pointer;
        }
        
        .flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            animation: flicker 0.1s infinite alternate;
        }

        @keyframes flicker {
            from { opacity: 0.8; transform: translateX(-50%) scale(1); }
            to { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }

        .instruction {
            font-size: 0.6rem;
            color: #00ff00;
            text-decoration: underline;
            letter-spacing: 1px;
        }

        /* Step 3: Foto Akhir */
        #final-photo {
            position: absolute;
            width: 80%;
            max-width: 300px;
            border: 8px solid white;
            display: none;
            z-index: 10;
            animation: zoomIn 1s;
        }

        @keyframes zoomIn {
            from { transform: scale(0); rotate: -10deg; }
            to { transform: scale(1); rotate: 0deg; }
        }

        .hbd-text {
            display: none;
            position: absolute;
            top: 15%;
            z-index: 12;
            color: #ff00ff;
            text-align: center;
            width: 100%;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>
    <canvas id="pixel-canvas"></canvas>

    <div id="overlay">
        <h1>R U NAJMI?</h1>
        <button onclick="initSequence()">YES!</button>
    </div>

    <img id="final-photo" src="foto_asli.jpg" alt="Final Surprise">
    <div class="hbd-text" id="hbd-text">SELAMAT 21 TUAK!</div>

    <div id="ui-layer">
        <div class="cake-container" onclick="blowCandle()">
            <span class="flame" id="lilin">🔥</span>
            🎂<br><span style="font-size: 1.5rem;">21</span>
        </div>
        <p class="instruction">KLIK UNTUK TIUP LILIN</p>
    </div>

    <script>
        const starCanvas = document.getElementById('star-canvas');
        const sCtx = starCanvas.getContext('2d');
        const mainCanvas = document.getElementById('pixel-canvas');
        const mCtx = mainCanvas.getContext('2d');

        let particles = [];
        let isBlown = false;
        const images = [];
        const imageSources = ['char1.png', 'char2.png', 'char3.png', 'char4.png', 'char5.png'];
        let loadedCount = 0;

        // Load Images
        imageSources.forEach((src, idx) => {
            const img = new Image();
            img.src = src;
            img.onload = () => { loadedCount++; images[idx] = img; };
        });

        function resize() {
            starCanvas.width = mainCanvas.width = window.innerWidth;
            starCanvas.height = mainCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Star Background
        const stars = Array.from({length: 50}, () => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: 2
        }));

        function drawStars() {
            sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            sCtx.fillStyle = "white";
            stars.forEach(s => {
                sCtx.globalAlpha = Math.random();
                sCtx.fillRect(s.x, s.y, s.size, s.size);
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        class Particle {
            constructor(x, y, color, tx, ty) {
                this.x = Math.random() * mainCanvas.width;
                this.y = Math.random() * mainCanvas.height;
                this.tx = tx; this.ty = ty;
                this.color = color;
                this.size = 3;
                this.vx = 0; this.vy = 0;
            }
            update() {
                if(!isBlown) {
                    this.x += (this.tx - this.x) * 0.07;
                    this.y += (this.ty - this.y) * 0.07;
                } else {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.2; // Gravity
                }
            }
            draw() {
                mCtx.fillStyle = this.color;
                mCtx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function initSequence() {
            if(loadedCount < 5) return alert("Sabar, pixel lagi loading...");
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';

            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            
            const slice = mainCanvas.width / 5;
            images.forEach((img, idx) => {
                const scale = (slice * 0.8) / img.width;
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                tCtx.drawImage(img, 0, 0);
                const data = tCtx.getImageData(0, 0, img.width, img.height).data;

                for (let y = 0; y < img.height; y += 4) {
                    for (let x = 0; x < img.width; x += 4) {
                        const i = (y * img.width + x) * 4;
                        if(data[i+3] > 128) {
                            particles.push(new Particle(
                                x, y, 
                                `rgb(${data[i]},${data[i+1]},${data[i+2]})`,
                                (slice * idx) + (slice/2) - (img.width*scale/2) + (x*scale),
                                (mainCanvas.height * 0.4) + (y*scale)
                            ));
                        }
                    }
                }
            });
            animate();
        }

        function blowCandle() {
            isBlown = true;
            document.getElementById('lilin').style.display = 'none';
            document.getElementById('ui-layer').style.opacity = '0.3';
            
            // Ledakkan partikel
            particles.forEach(p => {
                p.vx = (Math.random() - 0.5) * 20;
                p.vy = (Math.random() - 0.5) * 20;
            });

            // Munculkan foto asli setelah 1 detik
            setTimeout(() => {
                particles = []; // Hapus karakter pixel
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('final-photo').style.display = 'block';
                document.getElementById('hbd-text').style.display = 'block';
            }, 1000);
        }

        function animate() {
            mCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
